<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>متحفك الخاص - AR</title>
  
  <script src="js/i18n.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <style>
    .a-enter-vr { display: none !important; }
    .ar-action-btn { position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #0b0908; border: none; padding: 15px 30px; border-radius: 999px; font-weight: bold; font-size: 1.1rem; font-family: inherit; box-shadow: 0 4px 15px rgba(209, 177, 90, 0.4); cursor: pointer; transition: 0.1s; pointer-events: auto; z-index: 1000; display: none; }
    .ar-action-btn:active { transform: translateX(-50%) scale(0.95); }
    #ar-loading { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: var(--sand); padding: 20px 40px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; backdrop-filter: blur(5px); z-index: 1001; }
  </style>
</head>
<body style="touch-action: none;"> 

  <div id="ui-overlay">
    <div class="top-bar">
      <a href="index.html" class="btn-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span data-i18n="btn_back">العودة للرئيسية</span>
      </a>
      <div class="instruction-badge" id="ar-instruction" style="display: none;" data-i18n="cam_start">اضغط تشغيل الكاميرا للبدء</div>
    </div>

    <button id="btn-start-tour" data-i18n="start_tour">👁️ بدء التجول</button>
    <button id="btn-end-tour" data-i18n="end_tour">إنهاء التجول ✖</button>

    <div id="thank-you-screen">
      <h1 data-i18n="thank_you_title">شكراً لزيارتك</h1>
      <p data-i18n="thank_you_desc">لقد قمت بتصميم مساحة تراثية رائعة.</p>
    </div>

    <button id="btn-custom-ar" data-i18n="btn_custom_ar" style="position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); padding: 15px 30px; background: linear-gradient(135deg, #d1b15a, #8a7342); color: white; font-weight: bold; border-radius: 999px; border: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(209, 177, 90, 0.4); cursor: pointer; font-family: 'Tajawal', sans-serif;">
      تشغيل كاميرا الواقع المعزز
    </button>

    <div class="height-slider-container" id="height-ctrl">
      <input type="range" id="height-range" min="0" max="2.5" step="0.01" value="0">
      <span class="slider-label" data-i18n="slider_label">الارتفاع</span>
    </div>

    <div id="ar-loading" data-i18n="ar_loading">جاري تجهيز القطعة...</div>

    <button id="btn-place-model" class="ar-action-btn" data-i18n="drop_model">➕ إسقاط المجسم هنا</button>

    <div class="bottom-bar" id="bottom-panel" style="display: none;">
      <div class="items-carousel" id="museum-items"></div>
    </div>
  </div>

  <button id="hidden-vr" style="display: none;"></button>

  <a-scene 
    id="webxr-scene"
    webxr="optionalFeatures: local-floor, dom-overlay; overlayElement: #ui-overlay;"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enterARButton: #btn-custom-ar; enterVRButton: #hidden-vr">
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="1 2 0.5" intensity="1.2" castShadow="true"></a-light>
    <a-camera position="0 1.6 0" look-controls="touchEnabled: false"></a-camera>
  </a-scene>

  <script src="js/museum.js"></script>
</body>
</html>
