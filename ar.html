<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>HIRO AR Museum — Camera</title>

  <!-- A-Frame and AR.js load first, blocking, no defer/async -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <!-- Components registered in <head> AFTER libraries, BEFORE body -->
  <script>
    AFRAME.registerComponent('sticky-ar', {
      init: function () {
        this.found = false;
        this.el.addEventListener('markerFound', function () {
          this.found = true;
        }.bind(this));
      },
      tick: function () {
        if (this.found) {
          this.el.object3D.visible = true;
        }
      }
    });

    AFRAME.registerComponent('face-cam', {
      init: function () {
        this._v = new THREE.Vector3();
      },
      tick: function () {
        if (!this.el.sceneEl.camera) return;
        this.el.sceneEl.camera.getWorldPosition(this._v);
        this.el.object3D.lookAt(this._v);
      }
    });

    AFRAME.registerComponent('update-hud', {
      schema: { label: { type: 'string', default: '' } },
      init: function () {
        var label = this.data.label;
        this.el.addEventListener('markerFound', function () {
          var el = document.getElementById('hud-artifact');
          if (el) el.textContent = label;
        });
        this.el.addEventListener('markerLost', function () {
          var el = document.getElementById('hud-artifact');
          if (el) el.textContent = '';
        });
      }
    });
  </script>

  <style>
    /* ONLY body CSS — critical for AR camera to show */
    body {
      margin: 0;
      overflow: hidden;
    }

    /* Hide A-Frame VR button */
    .a-enter-vr {
      display: none !important;
    }

    /* HUD layer — fixed, on top, non-blocking (except exit btn) */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
      pointer-events: none;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* Top bar */
    #hud-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: linear-gradient(180deg, rgba(0,0,0,0.75) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      gap: 8px;
    }

    #hud-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .hiro-mark {
      width: 32px;
      height: 32px;
      border: 2px solid #fff;
      background: #000;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .hiro-mark .wb {
      flex: 1;
      background: #fff;
    }
    .hiro-mark .lb {
      background: #fff;
      border-top: 2px solid #000;
      padding: 2px 3px;
      line-height: 1;
    }
    .hiro-mark .lb span {
      font-weight: 900;
      color: #000;
      font-size: 7px;
      letter-spacing: 0.5px;
    }

    #hud-logo-text {
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    #hud-artifact {
      color: #C9A84C;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      flex: 1;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #hud-exit {
      pointer-events: auto;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }
    #hud-exit:hover {
      background: rgba(255,255,255,0.28);
    }

    /* Bottom bar */
    #hud-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(0deg, rgba(0,0,0,0.72) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #hud-hint {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      letter-spacing: 0.5px;
      text-align: center;
      direction: rtl;
    }

    /* Corner reticle */
    #reticle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 64px;
      height: 64px;
    }
    .reticle-corner {
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: rgba(201,168,76,0.9);
      border-style: solid;
    }
    .reticle-corner.tl { top: 0; left: 0;  border-width: 2px 0 0 2px; }
    .reticle-corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
    .reticle-corner.bl { bottom: 0; left: 0;  border-width: 0 0 2px 2px; }
    .reticle-corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
  </style>
</head>
<body>

  <!-- HUD overlay (no A-Frame, pure HTML/CSS/JS) -->
  <div id="hud">
    <div id="hud-top">
      <div id="hud-logo">
        <div class="hiro-mark">
          <div class="wb"></div>
          <div class="lb"><span>HIRO</span></div>
        </div>
        <span id="hud-logo-text">HIRO AR</span>
      </div>
      <span id="hud-artifact"></span>
      <button id="hud-exit" onclick="location.href='index.html'">&#x2715; Exit</button>
    </div>

    <div id="reticle">
      <div class="reticle-corner tl"></div>
      <div class="reticle-corner tr"></div>
      <div class="reticle-corner bl"></div>
      <div class="reticle-corner br"></div>
    </div>

    <div id="hud-bottom">
      <span id="hud-hint">وجّه الكاميرا على الماركر</span>
    </div>
  </div>

  <!-- A-Scene: NO display:none, NO embedded attribute -->
  <a-scene
    arjs="debugUIEnabled: false;"
    renderer="alpha: true; antialias: true;"
    vr-mode-ui="enabled: false"
    loading-screen="enabled: false"
  >

    <!-- Marker 1: Hiro → Amphora (GLB model) -->
    <a-marker preset="hiro" sticky-ar update-hud="label: AMPHORA">
      <a-entity
        gltf-model="models/Amphora.glb"
        scale="0.5 0.5 0.5"
        position="0 0 0"
        rotation="0 0 0"
      ></a-entity>
      <a-entity position="0 1.4 0" face-cam>
        <a-plane color="#000000" opacity="0.88" width="2.0" height="0.7" position="0 0 -0.005"></a-plane>
        <a-text value="AMPHORA" color="#C9A84C" align="center" width="1.7" position="0 0.18 0"></a-text>
        <a-text value="Ancient Greece · 5th Century BC" color="#cccccc" align="center" width="1.6" position="0 0.01 0"></a-text>
        <a-text value="Classical storage vessel for wine" color="#888888" align="center" width="1.5" position="0 -0.18 0"></a-text>
      </a-entity>
    </a-marker>

    <!-- Marker 2: Kanji → Egyptian Pyramid (primitives) -->
    <a-marker preset="kanji" sticky-ar update-hud="label: GREAT PYRAMID">
      <!-- Pyramid body: gold cone -->
      <a-cone
        position="0 0.61 0"
        radius-bottom="0.6"
        radius-top="0.01"
        height="1.2"
        color="#C9A84C"
        roughness="0.6"
        metalness="0.2"
      ></a-cone>
      <!-- Base: stone-colored box -->
      <a-box
        position="0 0.03 0"
        width="1.3"
        height="0.06"
        depth="1.3"
        color="#b5a080"
        roughness="0.9"
      ></a-box>
      <a-entity position="0 1.4 0" face-cam>
        <a-plane color="#000000" opacity="0.88" width="2.0" height="0.7" position="0 0 -0.005"></a-plane>
        <a-text value="GREAT PYRAMID" color="#C9A84C" align="center" width="1.7" position="0 0.18 0"></a-text>
        <a-text value="Ancient Egypt · 2560 BC" color="#cccccc" align="center" width="1.6" position="0 0.01 0"></a-text>
        <a-text value="Symbol of the Pharaonic civilization" color="#888888" align="center" width="1.5" position="0 -0.18 0"></a-text>
      </a-entity>
    </a-marker>

    <!-- Marker 3: Cross pattern → Roman Coin (cylinder + torus) -->
    <a-marker type="pattern" url="models/cross.patt" sticky-ar update-hud="label: ROMAN COIN">
      <!-- Coin face: bronze cylinder -->
      <a-cylinder
        position="0 0.045 0"
        radius="0.45"
        height="0.09"
        color="#cd7f32"
        roughness="0.4"
        metalness="0.7"
      ></a-cylinder>
      <!-- Rim: torus -->
      <a-torus
        position="0 0.09 0"
        radius="0.46"
        radius-tubular="0.04"
        color="#a0522d"
        roughness="0.5"
        metalness="0.6"
      ></a-torus>
      <!-- SPQR inscription text on coin face -->
      <a-text
        value="SPQR"
        color="#ffd700"
        align="center"
        width="0.8"
        position="0 0.1 0"
        rotation="-90 0 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
      ></a-text>
      <a-entity position="0 1.4 0" face-cam>
        <a-plane color="#000000" opacity="0.88" width="2.0" height="0.7" position="0 0 -0.005"></a-plane>
        <a-text value="ROMAN COIN" color="#C9A84C" align="center" width="1.7" position="0 0.18 0"></a-text>
        <a-text value="Roman Empire · 100 AD" color="#cccccc" align="center" width="1.6" position="0 0.01 0"></a-text>
        <a-text value="Bronze denarius · SPQR inscription" color="#888888" align="center" width="1.5" position="0 -0.18 0"></a-text>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
